name: Build and Push Identity Service

on:
  push:
    branches: [ master ]
    # This ensures the build only runs if code in 'src' changes
    paths:
      - 'src/**'
      - '.github/workflows/identity-service.yml'
  workflow_dispatch: # Allows manual trigger from Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          push: true
          # Uses the multi-stage Dockerfile in your root
          file: ./Dockerfile
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/identity-service:latest
